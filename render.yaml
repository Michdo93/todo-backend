services:
  - type: web
    name: todo-backend
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://Michdo93.github.io
      - key: RENDER
        value: true
    disk:
      name: todo-data
      mountPath: /data
      sizeGB: 1
